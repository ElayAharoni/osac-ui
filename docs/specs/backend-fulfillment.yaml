  - name: compute_instances_create
    description: Create compute instance (subject to proto policy / platform-only).
    endpoint: /api/fulfillment/v1/compute_instances
    method: POST
    auth:
      required: true
      roles_allowed: [system, provider_admin]
    request:
      schema:
        description: >-
          HTTP body is **ComputeInstance** at the root (same wire as GET item): proto JSON naming
          (`metadata.creation_timestamp`, `spec.memory_gib`, `spec.boot_disk`, `status.state` as `COMPUTE_INSTANCE_STATE_*`).
          `spec.template` is mandatory for create per fulfillment proto. (RPC may use a request wrapper; this REST binding does not.)
        allOf:
          - $ref: '#/reusable_schemas/ComputeInstance'
    response:
      success:
        status: 200
        schema:
          type: object
          properties:
            object:
              $ref: '#/reusable_schemas/ComputeInstance'
      errors:
        - code: 403_FORBIDDEN
          description: End user attempted direct create
        - code: 409_CONFLICT
          description: Name or id collision

  - name: compute_instances_update
    description: Partial update; omitted optionals preserved once PR421 behavior is active.
    endpoint: /api/fulfillment/v1/compute_instances/{id}
    method: PATCH
    auth:
      required: true
      roles_allowed: [tenant_user, tenant_admin, provider_admin, system]
    request:
      schema:
        type: object
        description: Body is ComputeInstance; only set fields participate in implicit mask.
        properties:
          metadata:
            $ref: '#/reusable_schemas/Metadata'
          spec:
            type: object
          status:
            type: object
    response:
      success:
        status: 200
        schema:
          type: object
          properties:
            object:
              $ref: '#/reusable_schemas/ComputeInstance'
      errors:
        - code: 412_PRECONDITION_FAILED
          description: lock=true and metadata.version mismatch
    example_requests:
      - |
        curl -sS -X PATCH -H "Authorization: Bearer $TOKEN" -H "Content-Type: application/json" \
          https://fulfillment.example/api/fulfillment/v1/compute_instances/123 \
          -d '{"spec":{"run_strategy":"Halted"},"status":{"state":"COMPUTE_INSTANCE_STATE_STOPPED"}}'
      - |
        curl -sS -X PATCH -H "Authorization: Bearer $TOKEN" -H "Content-Type: application/json" \
          https://fulfillment.example/api/fulfillment/v1/compute_instances/123 \
          -d '{"spec":{"run_strategy":"Always"},"status":{"state":"COMPUTE_INSTANCE_STATE_RUNNING"}}'
    spa_integration:
      client: apps/app-frontend/src/api/client.ts — patchComputeInstancePower(id, action)
      hook: usePatchVm — { id, powerAction: start | stop }; useVmRestartOrchestrator for Restart
      ui: VmActionsMenu Start/Stop → PATCH; Restart → stop then start when list shows stopped; delete confirm PATCH stop then DELETE

  - name: compute_instances_delete
    description: >-
      Delete VM. Fulfillment google.api.http mapping: `delete: "/api/fulfillment/v1/compute_instances/{id}"`.
      Upstream may transition status to COMPUTE_INSTANCE_STATE_DELETING before removal; demo UI treats
      successful DELETE as immediate removal from list (mock) or upstream acknowledgment (dev proxy).
    endpoint: /api/fulfillment/v1/compute_instances/{id}
    method: DELETE
    auth:
      required: true
      roles_allowed: [tenant_admin, provider_admin, system]
    request:
      schema:
        type: object
        properties:
          id:
            type: string
            required: true
    response:
      success:
        status: 200
        schema:
          type: object
          properties: {}
      errors:
        - code: 404_NOT_FOUND
          description: Unknown compute instance id
    example_requests:
      - |
        curl -sS -X DELETE -H "Authorization: Bearer $TOKEN" \
          https://fulfillment.example/api/fulfillment/v1/compute_instances/vm-123
    spa_integration:
      client: apps/app-frontend/src/api/client.ts — deleteComputeInstance(id)
      hook: useDeleteVm — invalidates TanStack Query key compute_instances on success
      ui: manage-virtual-machines — confirm modal; PATCH stop when not stopped, then DELETE

