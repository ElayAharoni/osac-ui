bonus_ux_gaps_and_edge_cases:
  - Help and Settings masthead actions are not rendered in shipped shell.
  - Account settings menu item prevents default with no navigation.
  - Provider admin infrastructure topology does not hand off to VM detail.
  - OIDC tokens persist in sessionStorage; logout clears session and returns to SignInPage.
  - Capabilities discovery runs via GET /api/fulfillment/v1/capabilities through the Go proxy.
