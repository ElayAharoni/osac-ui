# Normative: VM template catalog + create-vm wizard share compute_instance_templates
# Spec-only — implementation follows implementer_agent block below.

version: 1
id: template-catalog-wizard-api-alignment
title: Align CatalogPage and CreateVmWizard template path with compute_instance_templates

related_specs:
  - docs/specs/backend-fulfillment.yaml
  - docs/specs/ui-flows/vm-template-catalog.yaml
  - docs/specs/ui-flows/create-virtual-machine-wizard.yaml
  - docs/specs/FLOW-INDEX.yaml
  - docs/specs/demo-application-build-spec.yaml

problem_statement:
  description: >-
    The Templates catalog must call fulfillment **compute_instance_templates**, not **cluster_templates**, for VM templates.
    The Create VM wizard **template** step must show **the same template collection** as the catalog (single source of truth),
    not a separate hard-coded **VM_TEMPLATES** import from @osac/api-contracts.

architectural_rules:
  single_source:
    rule: >-
      Both **CatalogPage** (tenant + admin + provider global template routes) and **TemplateStep** inside CreateVmWizard MUST
      obtain list (and optional detail) data via the **same** fulfillment REST paths under the BFF proxy:
      `GET /api/fulfillment/v1/compute_instance_templates` and `GET /api/fulfillment/v1/compute_instance_templates/{id}`.
    forbidden: >-
      Divergent lists where catalog uses API A and wizard uses embedded VM_TEMPLATES (or cluster_templates) for the same UX purpose.
  caching:
    rule: >-
      Prefer **one** TanStack Query definition (shared `queryKey` + `queryFn`) so catalog filters and wizard picker stay coherent
      and benefit from shared cache invalidation.
  wire_vs_ui_model:
    rule: >-
      If fulfillment returns PROTO_JSON / snake_case shapes that do not match existing **ClusterTemplate** TypeScript, implement
      **normalizeComputeInstanceTemplate** (or extend types) in libs/api-contracts or apps/app-frontend/src/api — single mapper used by both surfaces.

bff_mock_and_dev:
  mock_mode:
    description: >-
      BFF mock handlers MUST serve **compute_instance_templates** with the **same** paging/filter semantics as fulfillment lists
      (offset, limit, filter) where the catalog relies on them; **compute_instance_templates/:id** SHOULD exist for drawer/detail parity.
      **cluster_templates** mock may remain for legacy or non-VM callers but MUST NOT be required for catalog/wizard once this spec is implemented.
  dev_mode:
    description: >-
      Proxied requests already hit fulfillment; no extra BFF logic beyond forwarding Authorization.

wizard_integration:
  template_step:
    rule: >-
      **TemplateStep** (`cvm_wizard_template`) replaces in-bundle **VM_TEMPLATES** iteration with the shared hook/query;
      loading/error/empty states must match catalog expectations (spinner, retry, empty message).
  preset_from_catalog:
    rule: >-
      When opening the wizard from catalog with **presetTemplateId**, the selected template MUST resolve by **id** against the same
      cached list or a **GET …/compute_instance_templates/{id}** if not in cache.

verification:
  manual:
    - Mock or dev — catalog Templates page Network tab shows **compute_instance_templates** only (not cluster_templates) for VM catalog.
    - Open wizard → template path → template step lists **same count/names** as catalog for same tenant/context (modulo filters).
  automated:
    - Extend **bff-contract.mock.test.ts** (or equivalent) for GET compute_instance_templates page envelope when mock registers route.
    - Frontend unit/integration test optional — shared query mock returns same fixtures for CatalogPage and TemplateStep.

implementer_agent:
  prompt_implementation: |
    ## Mission (code changes)
    Implement **docs/specs/template-catalog-wizard-api-alignment.yaml**: VM **Templates** catalog and Create VM wizard **template** step MUST both use
    **`GET /api/fulfillment/v1/compute_instance_templates`** (list + **`GET …/{id}`** when needed). Remove reliance on **`VM_TEMPLATES`** from
    `@osac/api-contracts` for those surfaces and stop using **`cluster_templates`** as the primary VM catalog API.

    ## Requirements
    1. **api/client.ts** — Add `listComputeInstanceTemplates` / `getComputeInstanceTemplate` (names flexible) targeting **`/compute_instance_templates`** paths;
       normalize wire JSON to the UI model if fulfillment shape differs from `ClusterTemplate`.
    2. **api/hooks.ts** — Expose e.g. `useComputeInstanceTemplates` with a stable **queryKey** shared by catalog and wizard.
    3. **CatalogPage** — Switch data hook to the shared compute_instance_templates hook; ensure provider global vs tenant routes still work.
    4. **TemplateStep** (`apps/app-frontend/src/components/vm/createVmWizard/steps/TemplateStep.tsx`) — Replace **`VM_TEMPLATES`** copy with the shared hook;
       preserve filters/search UX; handle loading and error.
    5. **BFF mock** (`apps/app-backend/src/routes/fulfillment.ts`) — Ensure **`compute_instance_templates`** supports list (+ **`/:id`** if catalog drawer needs it) with same paging/filter behavior as **`cluster_templates`** mock where applicable.
    6. **Tests** — Update **`bff-contract.mock.test.ts`** for compute_instance_templates; add/adjust frontend tests if present.

    ## Out of scope
    - Changing fulfillment-service protos.
    - Removing **cluster_templates** mock routes unless product confirms no other caller — may remain unused by SPA.

    ## Done when
    - Network tab: catalog + wizard template step request **`/api/fulfillment/v1/compute_instance_templates`** (same-origin via BFF).
    - No duplicated template lists from **`VM_TEMPLATES`** for catalog/wizard template path.
    - Spec cross-links satisfied (**backend-fulfillment.yaml** `replace_mock_data_sources`, **flows** vm-template-catalog / create-virtual-machine-wizard).
