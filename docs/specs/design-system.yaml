# OSAC demo — visual and design-system policy (single source of truth)
# Complements ui-flows/*.yaml (journeys) and FLOW-INDEX reusable component names (logical surfaces).

version: 1
id: osac-design-system-patternfly-6
title: PatternFly 6 design system for OSAC demo UI

system:
  name: PatternFly
  major_version: 6
  stack: React
  documentation:
    primary: https://www.patternfly.org/
    foundations: https://www.patternfly.org/design-foundations/about-design-foundations
    develop_react: https://www.patternfly.org/develop/react-developer-resources

packages:
  description: >-
    Monorepo ui kit aligns with libs/ui-components package.json; apps/app-frontend should consume
    UI through @osac/ui-components or the same @patternfly/* major versions — no mixing PF5 and PF6.
  required:
    - name: '@patternfly/patternfly'
      use_for: Base styles, design tokens, global CSS variables
    - name: '@patternfly/react-core'
      use_for: Layout, forms, navigation, feedback, content primitives
    - name: '@patternfly/react-icons'
      use_for: Masthead and action icons
    - name: '@patternfly/react-table'
      use_for: Data tables (tenant lists, VM lists, users)
  optional:
    - name: '@patternfly/react-charts'
      use_for: >-
        Donut and line charts. Import chart components from @patternfly/react-charts/victory
        (Chart, ChartAxis, ChartGroup, ChartLine, ChartDonut). The victory-* packages are peer
        dependencies of @patternfly/react-charts and are auto-resolved by pnpm (autoInstallPeers: true);
        do NOT add individual victory-* packages as direct dependencies in package.json.

layout_and_shell:
  description: >-
    Primary authenticated experience uses the PatternFly page pattern (prototype reference:
    Projects/osac-demo/src/App.tsx — Page, Masthead, PageSidebar, PageSection).
  document_scroll:
    description: >-
      apps/app-frontend/src/styles/global.css pins html/body to the viewport height with
      overflow hidden, and sets #root to height 100%, max-height 100dvh, overflow-y auto so the
      vertical scrollbar appears only when the mounted route exceeds the viewport. Unauthenticated
      layouts must not combine min-height 100dvh on an outer wrapper with additional near-viewport
      min-heights on children (that stacks past 100% and forces a useless scrollbar). PatternFly
      Page keeps long content scrolling inside .pf-v6-c-page__main-container.
  implementation_policy:
    prefer_patternfly_layout_primitives: true
    avoid_raw_div_for_structure: true
    avoid_custom_css_for_layout: true
      custom_css_policy: >-
        Do NOT write custom CSS classes for layout, spacing, or structure. Use PatternFly layout
        components (Grid/GridItem, Gallery/GalleryItem, Flex/FlexItem, Stack/StackItem, Split/SplitItem)
        and PF design tokens (var(--pf-t--global--spacer--*), var(--pf-t--global--font--*), etc.) via
        inline style props instead. Custom CSS is only permitted for: (1) chart SVG bounding box
        containers (@patternfly/react-charts/victory require explicit pixel height — add a
        pf-primitive-exception comment), (2) app-level scrollport rules in global.css that PF Page
        layout requires, and (3) institution-specific logo/brand accent overrides scoped to a data
        attribute. All other custom CSS classes are a spec violation.
    enforce_with_automated_check: true
    automated_check_command: pnpm check:pf-primitives
    automated_check_alignment: >-
      scripts/check-pf-primitives.mjs reads docs/specs/ui-flows/*.yaml: for each step under steps:,
      ui_policy.max_raw_div_wrappers sets how many raw opening <div> tags may appear in a source file
      without a pf-primitive-exception comment. TSX files should start with a block comment containing
      flow: <kebab-flow-id> and optionally step: <step_id> or steps: id1, id2 (comma-separated ids).
      If step(s) are omitted, the checker uses the maximum max_raw_div_wrappers among all steps in that
      flow (or among listed step ids). Non-div raw tags (span, section, article, main, lowercase button)
      are not budgeted in YAML; each occurrence still requires a nearby pf-primitive-exception comment.
    allowed_raw_div_cases:
      - purely decorative wrappers with no practical PatternFly primitive equivalent
      - narrow animation or positioning edge cases where PF primitives cannot express intent
      - counted toward ui_policy.max_raw_div_wrappers for the file's flow/step when under budget
      - overflow beyond the step budget or any non-div raw tag still uses pf-primitive-exception with a short rationale
    documentation_expectation: >-
      When a raw div is required beyond the ui_policy budget, add a short pf-primitive-exception comment
      explaining why PF primitives were not suitable for that case. Keep ui-flow yaml in sync when
      changing structural wrappers.
  primitives:
    - Page (masthead, sidebar, breadcrumb, main)
    - Masthead / MastheadMain / MastheadBrand / MastheadContent
    - PageSidebar / PageSidebarBody
    - Nav / NavList / NavItem / NavExpandable
    - PageSection for main content regions
  landing_unauthenticated:
    description: >-
      Welcome uses role columns with PatternFly icons (crown, users, user) and buttons; institutional
      login uses Card, Alert, Form, Button, Title, Content per ui-flows.

theming:
  description: >-
    Prefer PF6 global theme tokens (e.g. --pf-t--global--*) for spacing, typography, and semantic
    colors in chrome and shared components. Switch light/dark using documented PF v6 approach
    (e.g. pf-v6-theme-dark on document root / html element) rather than hardcoded background hex
    for application shell — institution-specific branding may still use scoped CSS for logos and accents.
  data_attributes:
    - >-
      Prototype may set data-osac-theme on documentElement alongside PF class toggles; product code
      should stay consistent with PF token semantics.

tokens_spacing_typography:
  rules:
    - Use spacer and font tokens from @patternfly/patternfly for gaps, padding, and type scale in new layout.
    - Reserve raw pixel values for fine-tuning only when a token does not exist; document exceptions in Storybook or code comments.
    - Status and semantic colors should use PF status tokens where applicable (success, warning, danger, info).

forms_and_feedback:
  rules:
    - Build forms with PF Form patterns (labels, helper text, validated FormGroup where applicable).
    - Use Alert for inline banners; Spinner or skeleton patterns for loading; disable inputs during submit when UX requires.
    - Wizard flows use PF Wizard (or Modal + stepped content) consistent with create-virtual-machine-wizard.yaml.
    - Prefer InputGroup, Stack, Flex, Bullseye, Split, and Grid for composition before raw div containers.

accessibility:
  rules:
    - Meet PatternFly component a11y guidance (keyboard operability, focus order, ARIA on composite widgets).
    - Provide aria-label on icon-only Masthead and toolbar controls; associate errors with fields.
    - Run Storybook with @storybook/addon-a11y on libs/ui-components stories for primary states.

charts_topology_custom:
  description: >-
    FLOW-INDEX lists DonutChart, LineChart, NetworkTopology, RecentActivityList — not all are single
    exported PF components. Implement with PF6 tokens for color and typography.
  charts_implementation:
    package: '@patternfly/react-charts'
    import_path: '@patternfly/react-charts/victory'
    components:
      - Chart
      - ChartAxis
      - ChartGroup
      - ChartLine
      - ChartDonut
    peer_deps_policy: >-
      victory-* packages are peer dependencies resolved automatically by pnpm (autoInstallPeers: true).
      Never install them as direct dependencies. The Vite optimizeDeps entry for victory
      must use the deep-import syntax '@patternfly/react-charts > victory-core' to let Vite
      discover transitively without a separate package.json entry.
    custom_css_exception: >-
      SVG chart containers require an explicit pixel height; wrap in a <div style={{ height: N }}>
      with a pf-primitive-exception comment. All other layout uses PF primitives.

flow_component_mapping:
  description: >-
    Maps FLOW-INDEX reusable_components_across_flows and common ui-flows ui.components entries to typical
    @patternfly/react-core (or react-table / react-icons) families. Exact component names follow PF v6 API.
  mappings:
    - logical: PageShell
      patternfly: Page, Masthead, PageSidebar, PageSection composition
    - logical: Masthead
      patternfly: Masthead, MastheadToggle, Toolbar, MenuToggle, Dropdown
    - logical: SidebarNav
      patternfly: Nav, NavList, NavItem, NavExpandable
    - logical: Modal
      patternfly: Modal, Modal variants
    - logical: Wizard
      patternfly: >-
        PatternFly Wizard (WizardHeader, WizardBody, WizardFooter) hosted inside Modal when the flow
        requires a dialog; use WizardNav + WizardNavItem for the left-hand step navigation rail
        (sub-step titles, enable/disable per PF guidance). Do not replace with Progress-only steppers
        for create-virtual-machine-wizard — that flow is specified as a real Wizard with nav rail;
        see ui-flows/create-virtual-machine-wizard.yaml.
    - logical: Form
      patternfly: Form, FormGroup, TextInput, Checkbox, etc.
    - logical: Table
      patternfly: Table via @patternfly/react-table (Thead, Tbody, Tr, Th, Td patterns)
    - logical: Card
      patternfly: Card, CardHeader, CardTitle, CardBody
    - logical: Gallery
      patternfly: Gallery or CSS Grid with PF spacing tokens
    - logical: Breadcrumb
      patternfly: Breadcrumb, BreadcrumbItem
    - logical: Tabs
      patternfly: Tabs, Tab, TabTitleText
    - logical: Alert
      patternfly: Alert
    - logical: Label
      patternfly: Label
    - logical: Dropdown
      patternfly: Dropdown, DropdownList, DropdownItem, MenuToggle
    - logical: SearchInput
      patternfly: SearchInput or TextInput with search affordance
    - logical: ToggleGroup
      patternfly: ToggleGroup, ToggleGroupItem
    - logical: DescriptionList
      patternfly: DescriptionList and group variants
    - logical: NetworkTopology
      patternfly: Custom layout/SVG with PF tokens (no single PF topology export)
    - logical: DonutChart
      patternfly: '@patternfly/react-charts or token-styled custom chart'
    - logical: LineChart
      patternfly: '@patternfly/react-charts or token-styled custom chart'
    - logical: RecentActivityList
      patternfly: DataList, List, or Table with PF list patterns

relation_to_ui_flows:
  rule: >-
    ui-flows/*.yaml describe user goals, steps, and logical ui.components; this file governs how those
    surfaces are implemented visually. Do not duplicate journey text here.
