flow: Application shell session
statechart_ref: ../statecharts/application-shell-session.statechart.yaml
design_system_ref: ../design-system.yaml

implementation_status:
  as_of: '2026-06'
  nav_source: apps/app-frontend/src/pages/shell/shellNav.ts
  deferred:
    - Masthead notifications bell (recent activities)
    - Help and Settings masthead actions
    - Sidebar landing shortcut that clears VM session state
    - Quota control, Storage, Organization settings, Security nav (tenant admin)
    - Resource allocation, Security, Platform settings nav (provider admin)

rbac:
  required_permissions_by_step:
    shell_primary_workspace:
      view_shell: view_shell
      select_nav_item: navigate_shell_sections
      open_account_menu: navigate_shell_sections
      logout: logout
      toggle_theme: use_theme_toggle

steps:
  - id: shell_primary_workspace
    title: Primary workspace shell
    goal: Navigate primary areas via sidebar while viewing masthead identity and operating mode label.

    role_variants:
      tenant_user:
        sidebar_nav: Dashboard, My VMs, Templates (see TENANT_USER_NAV in shellNav.ts)
        masthead: User display name; operating mode label for tenant user persona
        fleet_scope: Virtual machines for the signed-in tenant
      tenant_admin:
        sidebar_nav: >-
          Dashboard; expandable Management (Users, Template catalog); Networks
          (see TENANT_ADMIN_NAV in shellNav.ts)
        masthead: Admin display name; operating mode label for tenant admin persona
        fleet_scope: Tenant-scoped administration content
      provider_admin:
        sidebar_nav: >-
          Dashboard; expandable Management (Tenant organizations, Global templates); Infrastructure
          (see PROVIDER_ADMIN_NAV in shellNav.ts)
        masthead: Provider admin display name; operating mode label for provider persona
        fleet_scope: Provider-wide org and template views

    ui:
      components:
        - PageShell
        - Page
        - PageSection
        - Stack
        - Flex
        - Masthead
        - MastheadLogo
        - Dropdown
        - Label
        - SidebarNav
        - ThemeToggle
    ui_policy:
      prefer_patternfly_primitives: true
      avoid_raw_div_for_structure: true
      avoid_custom_css: true
      minimize_raw_div_wrappers: true
      max_raw_div_wrappers: 2
      custom_css_policy_ref: ../design-system.yaml#layout_and_shell.implementation_policy

    states:
      - ready
      - nav_item_active
      - expandable_nav_group_expanded
      - expandable_nav_group_collapsed
      - user_menu_open
      - user_menu_closed
      - theme_light
      - theme_dark

    interactions:
      - Select sidebar nav item to change main content route.
      - Re-select My VMs while already on My VMs to return from VM detail to list view.
      - Re-select Templates while active to reset catalog drawer or grid.
      - Expand or collapse sidebar groups for tenant admin or provider admin.
      - Open account menu; click log out to clear OIDC session and return to SignInPage (/).
      - Toggle light or dark theme from sidebar footer control.

transitions:
  - from: shell_primary_workspace
    action: select different primary nav item
    to: shell_primary_workspace
  - from: shell_primary_workspace
    action: account menu log out
    to: auth_sign_in_form
  - from: auth_post_login_transition
    action: user authenticated and shell rendered
    to: shell_primary_workspace
  - from: tud_dashboard_home
    action: user authenticated and shell rendered
    to: shell_primary_workspace
  - from: tad_dashboard_home
    action: user authenticated and shell rendered
    to: shell_primary_workspace
  - from: pad_dashboard_home
    action: user authenticated and shell rendered
    to: shell_primary_workspace

validation_rules: []
