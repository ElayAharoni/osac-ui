flow: Welcome and role selection
statechart_ref: ../statecharts/welcome-and-role-selection.statechart.yaml

implementation_status:
  status: deferred
  replaced_by: OIDC SignInPage + AuthCallback (apps/app-frontend/src/pages/auth/)
  note: Retained for prototype reference only — not shipped in osac-ui.

rbac:
  required_permissions_by_step:
    wrs_welcome_landing:
      enter_provider_admin: choose_persona
      select_tenant_user: choose_persona
      select_tenant_admin: choose_persona
      toggle_theme: use_theme_toggle
    wrs_role_selected_pre_auth:
      proceed_to_sign_in: choose_persona

terminology:
  provider_admin: >-
    UI label "Provider Admin" — service provider / platform operator console (Vertexa tenant
    context in the prototype). Stakeholders may say "SP Admin"; treat as the same persona.
  tenant_org_cards: >-
    Northstar Bank and Bluestone Financial Group simulate separate customer tenants. Internal
    demo tenant ids are northstar and evergreen (osac-entry slugs use evergreen-* for Bluestone).

entry_bootstrap:
  description: >-
    Welcome card clicks (Provider Admin and tenant org User/Admin) apply tenant and role in
    session then navigate to institutional sign-in in the same browser tab. Optional cold loads
    may use query param osac-entry so the app can set tenant and role before sign-in; after first
    load the app removes osac-entry from the address bar via replaceState.
  query_param: osac-entry
  browser_history:
    description: >-
      Navigation from welcome to sign-in uses pushState (not a session-only redirect from /)
      so the browser Back control returns to the welcome route. The root path must render the
      welcome step when the user navigates back. Cold loads with osac-entry apply session from
      the query, strip osac-entry via replaceState on the same history entry, then push sign-in
      once so Back still reaches welcome.
  allowed_values:
    - northstar-user
    - northstar-admin
    - evergreen-user
    - evergreen-admin
  unknown_value_behavior: ignore; welcome landing unchanged if invalid

routing_matrix:
  - choice: Provider Admin — Enter
    browser_target: same_tab
    tenant_id: vertexa
    role: providerAdmin
    next_step: wrs_role_selected_pre_auth
    then: auth_sign_in_form
  - choice: Northstar Bank — User
    browser_target: same_tab
    tenant_id: northstar
    role: tenantUser
    osac_entry: northstar-user
    next_step: wrs_role_selected_pre_auth
    then: auth_sign_in_form
  - choice: Northstar Bank — Admin
    browser_target: same_tab
    tenant_id: northstar
    role: tenantAdmin
    osac_entry: northstar-admin
    next_step: wrs_role_selected_pre_auth
    then: auth_sign_in_form
  - choice: Bluestone Financial Group — User
    browser_target: same_tab
    tenant_id: evergreen
    role: tenantUser
    osac_entry: evergreen-user
    next_step: wrs_role_selected_pre_auth
    then: auth_sign_in_form
  - choice: Bluestone Financial Group — Admin
    browser_target: same_tab
    tenant_id: evergreen
    role: tenantAdmin
    osac_entry: evergreen-admin
    next_step: wrs_role_selected_pre_auth
    then: auth_sign_in_form

steps:
  - id: wrs_welcome_landing
    title: Red Hat OSAC Prototypes
    goal: Choose provider console or a tenant organization entry persona (user vs admin) for the demo.

    content:
      heading_h1: Red Hat OSAC Prototypes
      lede: Choose a role, then pick an organization where applicable.
      demo_alert:
        title: Demo entry — not a customer sign-in page
        body_paragraphs:
          - >-
            This screen is for booth operators to pick a persona. In production, end users open
            their organization-branded URL (for example Northstar Bank or Bluestone Financial Group)
            and sign in through the identity provider the cloud administrator configured during onboarding.
          - >-
            Each column simulates a separate persona path so you can show multi-tenant isolation
            in the VM workspace.
      role_columns:
        provider_admin:
          title: Provider Admin
          icon: crown (PatternFly CrownIcon in circular badge)
          copy: Manage platform services, tenants, and global policies for the OSAC environment.
          primary_action_label: Enter
        tenant_admin:
          title: Tenant Admin
          icon: users (PatternFly UsersIcon in circular badge)
          copy: Configure organization resources, users, quotas, and shared services.
          tenant_actions:
            - label: Northstar Bank
            - label: Bluestone Financial Group
        tenant_user:
          title: Tenant User
          icon: user (PatternFly UserIcon in circular badge)
          copy: Access the VM-as-a-Service workspace to create and manage your virtual machines.
          tenant_actions:
            - label: Northstar Bank
            - label: Bluestone Financial Group

    ui:
      components:
        - main
        - Title
        - Content
        - Alert
        - Flex
        - Button
        - ThemeToggle
        - img (Red Hat logo, /red-hat-logo.svg)
        - PatternFly icons (CrownIcon, UsersIcon, UserIcon) in role badges
    ui_policy:
      prefer_patternfly_primitives: true
      minimize_raw_div_wrappers: true
      max_raw_div_wrappers: 8

    states:
      - ready
      - theme_light
      - theme_dark

    interactions:
      - Click Enter under Provider Admin to select provider persona and Vertexa tenant context in this same tab.
      - Under Tenant User, click Northstar Bank or Bluestone Financial Group to select that tenant and tenant user role, then navigate to institutional sign-in.
      - Under Tenant Admin, click Northstar Bank or Bluestone Financial Group to select that tenant and tenant admin role, then navigate to institutional sign-in.
      - Toggle landing light/dark theme.

  - id: wrs_role_selected_pre_auth
    title: Institution and persona locked (pre-auth) — same tab only
    goal: >-
      In the current tab only: application holds selectedDemoTenant, demoShellRole, and
      default nav target before sign-in. Applies after any welcome persona selection
      (Provider Admin, tenant org User, or tenant org Admin) before routing to sign-in.

    ui:
      components:
        - StateOnly

    states:
      - provider_admin_vertexa
      - tenant_user_northstar
      - tenant_admin_northstar
      - tenant_user_evergreen
      - tenant_admin_evergreen

    interactions:
      - Implicit when a welcome card action completes in the same tab before navigation to sign-in.

transitions:
  - from: wrs_welcome_landing
    action: click provider admin enter (same tab)
    browser_target: same_tab
    to: wrs_role_selected_pre_auth
  - from: wrs_welcome_landing
    action: click organization user on northstar or bluestone card (same tab)
    browser_target: same_tab
    to: wrs_role_selected_pre_auth
  - from: wrs_welcome_landing
    action: click organization admin on northstar or bluestone card (same tab)
    browser_target: same_tab
    to: wrs_role_selected_pre_auth
  - from: wrs_role_selected_pre_auth
    action: route to institutional sign-in screen (same tab)
    browser_target: same_tab
    to: auth_sign_in_form

validation_rules: []
