flow: Tenant user dashboard
statechart_ref: ../statecharts/tenant-user-dashboard.statechart.yaml

implementation_status:
  as_of: '2026-06'
  shipped: >-
    Four VM power-state KPI cards, welcome header, Create virtual machine button, stat-card navigation
    to My VMs. Data from GET /api/fulfillment/v1/compute_instances via useComputeInstances.
  deferred:
    - Utilization line charts and period selector
    - Recent activities sidebar and full-page feed
    - Quota cards (DashboardVmQuotaSection)
    - DashboardVmUtilizationSection

rbac:
  required_permissions_by_step:
    tud_dashboard_home:
      view_dashboard: view_dashboard
      open_create_vm_modal: open_create_vm
      open_my_vms: view_my_vms
    tud_sparse_placeholder_page:
      open_sparse_nav_page: navigate_shell_sections

applies_when: >-
  Authenticated shell with demoShellRole tenantUser — not provider admin and not tenant admin.

backend:
  description: >-
    All dashboard metrics from fulfillment REST via Go proxy (see backend-fulfillment.yaml
    context.osac_proxy_integration).
  vm_status_kpi_cards:
    normative_ref: >-
      backend-fulfillment.yaml context.osac_real_api_integration.compute_instances_wire_format_and_ui.tenant_user_dashboard_kpis
    rules:
      - >-
        Four KPI cards (All VMs, Running, Paused, Stopped) MUST derive counts from the same normalized
        compute_instances list as My VMs (`GET /api/fulfillment/v1/compute_instances`), not from static
        fixture counts.
      - >-
        Aggregations use `VmPowerState` after mapping fulfillment enums (e.g. COMPUTE_INSTANCE_STATE_RUNNING → running).
      - >-
        starting / deleting / error VMs count toward All VMs only unless product adds more KPIs later.

steps:
  - id: tud_dashboard_home
    title: VM workspace dashboard
    goal: >-
      Render tenant-user home with page header, four VM power-state KPI cards, and create VM action.

    ui:
      components:
        - PageSection
        - PageHeader
        - Title
        - Button
        - Gallery
        - GalleryItem
        - Card
        - CardHeader
        - CardBody
        - CardTitle
        - Content
        - CreateVmWizard
    ui_policy:
      prefer_patternfly_primitives: true
      avoid_raw_div_for_structure: true
      avoid_custom_css: false
      minimize_raw_div_wrappers: true
      max_raw_div_wrappers: 2
      styling_fidelity_required: true
      design_system_ref: ../design-system.yaml
      custom_css_exception_policy_ref: ../design-system.yaml#layout_and_shell.implementation_policy

    states:
      - ready
      - kpi_cards_rendered
      - interaction_stat_card_hover

    interactions:
      - Click Create virtual machine to open create VM modal wizard at template step (template-only path).
      - Click All VMs stat card to navigate My VMs without power filter.
      - Click Running Paused or Stopped stat cards to navigate My VMs with matching power filter intent.
      - Dashboard header uses welcome copy with display name and VMaaS workspace subtitle.
      - KPI cards are clickable; KPI numeric values reflect live normalized VM state counts from TanStack Query.
      - >-
        **Deferred (not shipped):** utilization period dropdown, recent activities preview card, quota row.

    design_system_alignment:
      implementation_mode:
        - Build structure with PatternFly layout primitives (Gallery, PageSection, Card).
        - Visual spacing and layout hooks use co-located BEM CSS (DashboardPage.css, DashboardVmStatCard.css).
      layout_guidance:
        - Header row aligns welcome copy and primary create button.
        - KPI cards are a four-card Gallery row on desktop with responsive collapse on narrower breakpoints.

  - id: tud_sparse_placeholder_page
    title: Sparse shell page for unknown or non-dashboard nav
    goal: Show minimal page chrome when tenant user navigates to a nav item without dedicated content.

    ui:
      components:
        - PageSection
        - Title
    ui_policy:
      prefer_patternfly_primitives: true
      minimize_raw_div_wrappers: true
      max_raw_div_wrappers: 0

    states:
      - ready
      - empty_content

    interactions:
      - Select a sidebar item that maps to sparse layout.

transitions:
  - from: auth_post_login_transition
    action: complete login as tenant user
    to: tud_dashboard_home
  - from: shell_primary_workspace
    action: select dashboard nav while tenant user
    to: tud_dashboard_home
  - from: tud_dashboard_home
    action: click all VMs stat card
    to: mvm_list_view
  - from: tud_dashboard_home
    action: click running paused or stopped stat card
    to: mvm_list_view
  - from: tud_dashboard_home
    action: click create virtual machine
    to: cvm_modal_open
  - from: shell_primary_workspace
    action: tenant user selects non implemented primary nav
    to: tud_sparse_placeholder_page

validation_rules: []
