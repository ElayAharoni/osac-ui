flow: Tenant user dashboard
statechart_ref: ../statecharts/tenant-user-dashboard.statechart.yaml

rbac:
  required_permissions_by_step:
    tud_dashboard_home:
      view_dashboard: view_dashboard
      open_create_vm_modal: open_create_vm
      open_my_vms: view_my_vms
      open_recent_activities: view_recent_activities
    tud_sparse_placeholder_page:
      open_sparse_nav_page: navigate_shell_sections

applies_when: >-
  Authenticated shell with demoShellRole tenantUser after Northstar Bank or Bluestone Financial Group
  (tenant id evergreen) sign-in — not provider admin and not tenant admin.

backend:
  description: Dashboard data sources by BFF mode (see backend-fulfillment.yaml context.osac_bff_runtime_modes).
  vm_status_kpi_cards:
    normative_ref: >-
      backend-fulfillment.yaml context.osac_real_api_integration.compute_instances_wire_format_and_ui.tenant_user_dashboard_kpis
    rules:
      - >-
        Four KPI cards (All VMs, Running, Paused, Stopped) MUST derive counts from the same normalized
        compute_instances list as My VMs (`GET /api/fulfillment/v1/compute_instances`), not from static
        DEMO_VM_POWER_COUNTS when API data is available.
      - >-
        Aggregations use `VmPowerState` after mapping fulfillment enums (e.g. COMPUTE_INSTANCE_STATE_RUNNING → running).
      - >-
        starting / deleting / error VMs count toward All VMs only unless product adds more KPIs later.
  utilization_charts:
    note: Time series remain demo/synthetic until a metrics API exists; not driven by /api/events/v1/events.
  recent_activities_sidebar:
    dev:
      primary: GET /api/events/v1/events (fulfillment Events.Watch; proxied by BFF with Bearer)
      bff_note: >-
        Current BFF buffers upstream response bodies before returning (backend-fulfillment.yaml
        bff_proxy_matrix_dev.implementation_notes); sidebar/event UX should tolerate this until streaming passthrough lands.
      secondary: GET /api/fulfillment/v1/compute_instances for VM stat cards and optional hydration only
    mock:
      primary: Client buildRecentActivities from compute instance list and/or BFF mock GET /api/events/v1/events

steps:
  - id: tud_dashboard_home
    title: VM workspace dashboard
    goal: >-
      Render tenant-user home with sticky page title/actions, four VM power-state KPI cards,
      utilization charts + recent activities rail, and quota cards; preserve interaction and visual
      pattern from the reference UX repository.

    ui:
      components:
        - PageSection
        - PageToolbarSticky
        - Title
        - Button
        - Dropdown
        - MenuToggle
        - DropdownList
        - DropdownItem
        - RechartsLineChart
        - RechartsTooltip
        - ResponsiveContainer
        - Card
        - CardHeader
        - CardBody
        - CardTitle
        - Content
        - Label
        - DashboardVmUtilizationSection
        - DashboardVmQuotaSection
        - DonutChart
    ui_policy:
      prefer_patternfly_primitives: true
      avoid_raw_div_for_structure: true
      avoid_custom_css: false
      minimize_raw_div_wrappers: true
      max_raw_div_wrappers: 2
      styling_fidelity_required: true
      design_system_ref: ../design-system.yaml
      custom_css_exception_policy_ref: ../design-system.yaml#layout_and_shell.implementation_policy

    states:
      - ready_static_demo_data
      - kpi_cards_rendered
      - interaction_stat_card_hover
      - utilization_period_selected_24h
      - utilization_period_selected_7d
      - utilization_period_selected_30d
      - utilization_period_selected_90d
      - recent_activity_preview_visible
      - quota_grid_visible

    interactions:
      - Click Create virtual machine to open create VM modal wizard at deployment step.
      - Click All VMs stat card to navigate My VMs without power filter.
      - Click Running Paused or Stopped stat cards to navigate My VMs with matching power filter intent.
      - Select utilization time period (24h, 7d, 30d, 90d) from the period dropdown to update all four line charts.
      - Click the Recent activities card in the utilization section to navigate to the full activity feed.
      - Dashboard header uses sticky lead text: “Welcome <display-name>” and subtitle with VMaaS workspace copy.
      - KPI cards are clickable cards using CardHeader selectableActions and explicit aria labels.
      - Recent activities preview card in utilization rail is clickable and forwards to full-page recent activities.
      - Quota cards stay visible under utilization section and preserve tenant persona shaping for Northstar/Evergreen.
      - VM status KPI cards must match the original reference dashboard styling baseline (pre-change appearance).
      - KPI numeric values reflect live normalized VM state counts per backend.vm_status_kpi_cards (not hard-coded demo totals when Query returns instances).

    design_system_alignment:
      implementation_mode:
        - Build structure with PatternFly layout primitives first (Grid, Gallery, Flex, Stack, Split, PageSection).
        - Use PF spacing/typography/color tokens (`--pf-t--global--*`) for all sizing and visual rhythm.
        - Keep dashboard layout pattern unchanged: header row, KPI row, utilization + recent-activity rail, quota row.
      layout_guidance:
        - Header row uses PF primitives to align welcome copy and primary create button.
        - KPI cards remain a four-card row on desktop with responsive collapse on narrower breakpoints.
        - Utilization area remains two-column main/rail on desktop and stacks to one column on narrower screens.
        - Quota cards remain on one desktop row while preserving responsive behavior for small widths.
      custom_css_policy:
        - Existing dashboard class hooks are allowed in this flow for compatibility with current implementation.
        - New layout work should still prefer PatternFly primitives and token-based inline styles.
        - Allowed exceptions only per design-system policy (chart SVG height wrappers, app-level scrollport rules, scoped branding accents).
        - Any exception requires a nearby `pf-primitive-exception` rationale comment in implementation.
      chart_policy:
        - Prefer PF chart package (`@patternfly/react-charts` via `/victory`) for new chart work when feasible.
        - If existing chart implementation is retained, apply PF token semantics for typography, spacing, and semantic colors.
      accessibility_policy:
        - Preserve icon-only control aria-labels and selectable action labels on clickable cards.
        - Keep keyboard operability and focus visibility according to PatternFly guidance.

  - id: tud_sparse_placeholder_page
    title: Sparse shell page for unknown or non-dashboard nav
    goal: Show minimal page chrome when tenant user navigates to a nav item without dedicated content in prototype.

    ui:
      components:
        - PageSection
        - Title
    ui_policy:
      prefer_patternfly_primitives: true
      minimize_raw_div_wrappers: true
      max_raw_div_wrappers: 0

    states:
      - ready
      - empty_content

    interactions:
      - Select a sidebar item that maps to sparse layout in prototype.

transitions:
  - from: auth_post_login_transition
    action: complete login as tenant user
    to: tud_dashboard_home
  - from: shell_primary_workspace
    action: select dashboard nav while tenant user
    to: tud_dashboard_home
  - from: tud_dashboard_home
    action: click all VMs stat card
    to: mvm_list_view
  - from: tud_dashboard_home
    action: click running paused or stopped stat card
    to: mvm_list_view
  - from: tud_dashboard_home
    action: click create virtual machine
    to: cvm_modal_open
  - from: tud_dashboard_home
    action: open recent activities from utilization section
    to: ra_activity_feed
  - from: shell_primary_workspace
    action: tenant user selects non implemented primary nav
    to: tud_sparse_placeholder_page

validation_rules: []
