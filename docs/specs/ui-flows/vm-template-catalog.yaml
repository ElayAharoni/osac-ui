flow: VM template catalog
statechart_ref: ../statecharts/vm-template-catalog.statechart.yaml

applies_when: >-
  Authenticated shell where the shared TenantVmTemplatesCatalog surface is mounted:
  tenant user Templates nav, tenant admin VM templates nav, or provider admin Global templates nav.
  Tenant user is the primary implementation baseline for this flow.

backend:
  normative_spec: ../template-catalog-wizard-api-alignment.yaml
  primary_api:
    list: GET /api/fulfillment/v1/compute_instance_templates
    detail: GET /api/fulfillment/v1/compute_instance_templates/{id}
  rules:
    - >-
      Catalog grid, search, filters, and drawer detail MUST use the primary_api paths via BFF (not cluster_templates for VM rows).
    - >-
      Create VM wizard template step MUST reuse the **same** client/hook/query as this flow — single template inventory (see create-virtual-machine-wizard.yaml cross-reference).

rbac:
  required_permissions_by_step:
    vmc_catalog_grid:
      view_catalog_grid: view_catalog
      select_template: view_catalog
      update_filters_or_search: view_catalog
      create_from_template: create_from_template
      reselect_catalog_nav: view_catalog
    vmc_catalog_provider_global:
      view_global_templates: manage_global_templates
      create_from_global_template: create_from_template

steps:
  - id: vmc_catalog_grid
    title: Template catalog with sidebar categories and detail drawer
    goal: >-
      Browse VM templates, filter by operating system and workload categories, search by keyword,
      open the template detail drawer, and launch create virtual machine from the selected template.

    role_variants:
      tenant_user:
        page_title: VM templates
        page_description: Browse templates by operating system and workload.
        sidebar_nav_source: Templates
      tenant_admin:
        page_title: VM templates
        page_description: Browse templates by operating system and workload.
        sidebar_nav_source: Infrastructure > VM templates

    ui:
      components:
        - Title
        - Content
        - Drawer
        - DrawerPanelContent
        - DrawerHead
        - DrawerCloseButton
        - DrawerPanelBody
        - Sidebar
        - SidebarPanel
        - SidebarContent
        - ExpandableSection
        - Checkbox
        - SearchInput
        - Gallery
        - Card
        - Tabs
        - DescriptionList
        - Button
    ui_policy:
      prefer_patternfly_primitives: true
      minimize_raw_div_wrappers: true
      max_raw_div_wrappers: 2
      styling_fidelity_required: true

    states:
      - ready_static_data
      - drawer_closed
      - drawer_open
      - filter_all_items
      - filter_os_active
      - filter_workload_active
      - search_active
      - filtered_results_non_empty
      - filtered_results_empty
      - detail_tab_details

    interactions:
      - Click any template card (or press Enter/Space on focused card wrapper) to open the detail drawer.
      - Click Drawer close to return to catalog grid while preserving current filters and search.
      - Click Create virtual machine in drawer header to open create VM wizard from selected template and close drawer.
      - Use sidebar Categories checkboxes (Operating system and Workload); each group uses OR semantics within the group.
      - Apply cross-group filtering with AND semantics (OS match and workload match, when groups are active).
      - Click All items to clear both checkbox groups (search text remains unchanged).
      - >-
        Type in keyword search to filter by title, subtitle, workload labels, network/access labels, CPU, memory,
        and boot disk size (GiB) derived from template **defaults.boot_disk.size_gib** (wire) / normalized field — not boot-volume PVC strings.
      - Re-select Templates while already on the templates nav to close the detail drawer via navReselectSeq.
      - Drawer shows only one detail surface (no Parameters tab).
      - Opening drawer must not require any card-level checkbox, radio, or explicit selected control on the card face.
      - Opening drawer must not apply persistent selected styling (for example blue selected border/background) to the clicked card.
      - The page must use a single vertical scroll experience (no second nested scroller for catalog vs drawer).

    styling_contract:
      css_class_hooks_required:
        - tenant-vm-templates-catalog-root
        - tenant-vm-templates-drawer-host
        - tenant-vm-templates-drawer
        - tenant-vm-templates-drawer__main
        - catalog-vm-templates-sidebar
        - tenant-vm-template-drawer-panel
        - tenant-vm-template-drawer-head
        - tenant-vm-template-drawer-head-create
        - tenant-vm-template-drawer-body
        - tenant-vm-template-drawer-scroll
        - tenant-vm-template-drawer-tabs
        - tenant-vm-template-detail-stack
        - tenant-vm-catalog-template-card-wrap
        - osac-page-toolbar-sticky
      layout_and_spacing:
        - Root is flex column with width 100 percent, minWidth 0, minHeight 0.
        - Sticky toolbar lead uses h1 size 2xl and subtitle constrained to maxWidth 48rem.
        - Render a full-width separator directly below the page header block before sidebar/gallery content.
        - Sidebar layout keeps hasGutter true and hasBorder true.
        - Sidebar panel uses static variant with Categories h2 size md.
        - Keep noticeable vertical gap between Categories heading and All items button.
        - Main gallery content stacks SearchInput, count text, then Gallery with token-based gaps.
      drawer_behavior_and_geometry:
        - Drawer opens from end side when selectedTemplateId is set.
        - Drawer is rendered as an overlay in front of the catalog cards (above content layer), not as a side-by-side split that pushes cards.
        - Drawer panel widths are 100 percent on default and 50 percent from lg through 2xl.
        - Drawer panel max width is min(36rem, 100 percent).
        - Drawer panel uses elevated z-index (200) above catalog content.
        - Drawer panel uses rounded page-facing corners (border-start-start-radius and border-end-start-radius set to PF large radius token).
        - Avoid nested independent vertical scrollers; catalog and drawer should share a single page scroll behavior.
        - Remove Parameters tab from drawer; only Details content is rendered.
        - Drawer header top-left must show the same OS icon tile treatment used on catalog cards.
        - Drawer header title block shows template name with a short description directly below the name.
      gallery_and_card_presentation:
        - Render exactly 3 template cards per row in the main catalog grid (fixed three-column layout in the app shell content area).
        - Template card wrapper is keyboard focusable role button with pointer cursor and full-height card.
        - Template cards are presentational only (non-selectable state visuals); clicking only opens drawer with matching template details.
        - Do not render card-level Checkbox or Radio controls for template selection on this page.
        - Cards must render with a visible border in default state (PatternFly card border token/surface, not borderless).
        - Border stays visible in idle, hover, and focus states; hover may add elevation but must not remove border definition.
        - Wrapper focus-visible shows 2px clicked-border outline with 2px offset.
        - Wrapper hover elevates inner card with PF medium box shadow.
      card_content_alignment_with_create_vm_template_flow:
        - Catalog cards must reuse the same information architecture as the Create VM wizard Templates step cards.
        - Card header contains icon tile, template title, and subtitle (no badge-style workload labels in header).
        - Template title typography is smaller and more refined than current default catalog heading style (use a compact heading/body-large token style).
        - OS icon set in catalog cards must be identical to wizard template cards (RHEL Redhat icon, Windows icon, Linux Tux icon) with same visual sizing rules.
        - >-
          Card body contains resource row with CPU, Memory, and **Storage** as text values. **Storage** MUST show the numeric
          boot disk size in GiB from the template resource **`defaults.boot_disk.size_gib`** (fulfillment wire snake_case; normalize in UI model).
          Do **not** show a generic “boot volume” label or boot PVC name in place of this GiB value on the card.
        - Remove boot source pvc string from card body (for example rhel-9-general-boot-pvc must not appear between resources and divider).
        - Do not render additional descriptive/spec rows under the resources row except workload.
        - After the divider, render only a compact workload line and omit Network and Access rows.
        - Workload line below the divider must use smaller typography than resource values.
        - Prefer text row treatment over Label chips/badges for workload.
        - Description text and resource text use the same color treatment as workload line for visual consistency.
      drawer_details_content:
        - >-
          Details area must present exactly these fields in order as key-value rows: Guest operating system, CPU, Memory, Storage, Workload.
          **Storage** is **`defaults.boot_disk.size_gib` GiB** (formatted, e.g. “64 GiB”), not boot-volume PVC id text unless product explicitly adds a separate row later.
        - Do not show Network or Access fields in drawer details.
        - Include three status switches below the details rows: Headless mode, Guest system log access, Deletion protection.
        - These switches are informational only and must be disabled (non-interactive).
        - Switch state is still visible to indicate current status even though control is disabled.
        - The short description below the drawer title is supplementary context and does not replace the details field list.
      filter_panel_styling:
        - All items button is block width and uses secondary variant only when no category filters are active; otherwise plain variant.
        - Operating system and Workload groups use ExpandableSection with isIndented true.
        - Checkbox stacks inside each section use PF small spacing token.
      typographic_and_token_rules:
        - Use PF global tokens for spacing, text color subtle/regular, border radii, and shadows.
        - Avoid hard-coded pixel spacing except gallery minWidths and icon tile dimensions already present in source.
      a11y_visual_requirements:
        - Card wrappers must keep visible keyboard focus treatment; do not remove outline without replacement.
        - Drawer title keeps focus target on open via aria-labelledby and elementToFocusOnExpand configuration.
        - Search input keeps aria-label Filter catalog by keyword.

  - id: vmc_catalog_provider_global
    title: Provider global templates variant
    goal: >-
      Reuse the same catalog component under provider admin Global templates with custom page copy
      and optional toolbar actions.

    ui:
      components:
        - Title
        - Content
        - Button
        - Drawer
        - Sidebar
        - SearchInput
        - Gallery
        - Card
    ui_policy:
      prefer_patternfly_primitives: true
      minimize_raw_div_wrappers: true
      max_raw_div_wrappers: 2
      styling_fidelity_required: true

    states:
      - ready
      - context_provider_admin_shell
      - add_template_action_stub

    interactions:
      - Browse and inspect templates with the same filter/search/drawer behavior as tenant user flow.
      - Provider toolbar Add template action is currently stubbed (no-op) in prototype.

    styling_contract:
      inherits_from: vmc_catalog_grid.styling_contract
      provider_overrides:
        - Toolbar actions area remains right-aligned inside osac-page-toolbar-sticky__actions.
        - Primary Add template action appears in toolbar actions region and does not alter drawer/sidebar geometry.

transitions:
  - from: shell_primary_workspace
    action: tenant user selects templates nav
    to: vmc_catalog_grid
  - from: shell_primary_workspace
    action: tenant admin selects VM templates nav
    to: vmc_catalog_grid
  - from: shell_primary_workspace
    action: provider admin selects global templates nav
    to: vmc_catalog_provider_global
  - from: vmc_catalog_grid
    action: select template and click create virtual machine from drawer
    to: cvm_wizard_template
  - from: vmc_catalog_provider_global
    action: select template and click create virtual machine from drawer
    to: cvm_wizard_template
  - from: vmc_catalog_grid
    action: re-select templates nav while already active
    to: vmc_catalog_grid
  - from: tud_dashboard_home
    action: navigate to templates via shell
    to: vmc_catalog_grid
  - from: tad_dashboard_home
    action: navigate to VM templates via shell
    to: vmc_catalog_grid

validation_rules:
  - field: catalog_filters
    rules:
      - rule: os_filter_group_or_semantics
      - rule: workload_filter_group_or_semantics
      - rule: cross_group_and_semantics
      - rule: all_items_clears_checkbox_filters_only
  - field: catalog_search
    rules:
      - rule: optional_substring_match_case_insensitive
        note: >-
          >-
            Search checks title, subtitle, workload labels (card and canonical), network/access display labels,
            CPU, memory, and boot disk GiB string derived from **defaults.boot_disk.size_gib**. No minimum length.
  - field: create_from_template_entry
    rules:
      - rule: selected_template_required
      - rule: default_wizard_vm_name_is_template_id_suffix_vm
