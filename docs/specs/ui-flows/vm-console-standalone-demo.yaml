flow: VM console standalone demo
statechart_ref: ../statecharts/vm-console-standalone-demo.statechart.yaml

implementation_status:
  status: deferred
  note: >-
    Console launch and GET /api/osac/public/v1/console/.../access not wired in My VMs UI. The
    mvm_detail_drawer → vcd_console_page transition in manage-virtual-machines.yaml is commented
    RESTORE. This flow spec is retained for future console integration.

rbac:
  required_permissions_by_step:
    vcd_console_page:
      open_console_demo: launch_console
      close_console_demo: launch_console

steps:
  - id: vcd_console_page
    title: Interactive VM console demo
    goal: Full-page demo console separate from main shell when query demo equals vm-console.

    ui:
      components:
        - Page
        - PageSection
        - Stack
        - Flex
        - VmGuestDesktopContent
        - Windows11Taskbar
        - Button
    ui_policy:
      prefer_patternfly_primitives: true
      minimize_raw_div_wrappers: true
      max_raw_div_wrappers: 1

    states:
      - ready
      - loading
      - error_invalid_params
      - success_guest_os_linux
      - success_guest_os_rhel
      - success_guest_os_windows
      - closing

    interactions:
      - Close demo to clear query string and return to base pathname shell entry logic on next load.
      - Observe guest OS variant from os query param rhel windows or linux default.

transitions:
  - from: mvm_detail_drawer
    action: launch console opens new tab with vm-console query
    to: vcd_console_page
  - from: vcd_console_page
    action: close console demo in tab with default logged out React state
    to: wrs_welcome_landing
  - from: vcd_console_page
    action: close console demo in same document where isLoggedIn remains true
    to: shell_primary_workspace

validation_rules:
  - field: query_demo
    rules:
      - rule: must_equal_vm_console
  - field: query_osac_entry
    rules:
      - rule: ignored_when_demo_vm_console_present
        note: VM console demo query takes precedence; osac-entry is not applied for tenant bootstrap in that case.
  - field: query_os
    rules:
      - rule: optional_enum_rhel_windows_linux
        note: Invalid values fall back to linux in parseGuestOsQueryParam.
