flow: Recent activities
statechart_ref: ../statecharts/recent-activities.statechart.yaml

backend:
  description: Full-page activity feed; align with backend-fulfillment.yaml flows.recent-activities and context.osac_bff_runtime_modes.
  dev:
    primary: GET /api/events/v1/events (fulfillment Events.Watch; BFF must proxy in OSAC_API_MODE=dev)
    implementation_note: >-
      The BFF currently buffers the upstream response before returning it (backend-fulfillment.yaml
      bff_proxy_matrix_dev.implementation_notes). Client streaming/SSE consumption may still work for many gateways;
      treat low-latency chunk delivery as a future improvement when true streaming passthrough lands.
  mock:
    note: May use BFF mock JSON or client-derived activities until stream integration ships.

rbac:
  required_permissions_by_step:
    ra_activity_feed:
      view_activity_feed: view_recent_activities
      navigate_back_to_workspace: navigate_shell_sections

steps:
  - id: ra_activity_feed
    title: Recent activities
    goal: Read chronological demo activity across VMs and workspaces from full-page view.

    ui:
      components:
        - PageSection
        - Stack
        - Flex
        - Breadcrumb
        - Button
        - List
        - Label
    ui_policy:
      prefer_patternfly_primitives: true
      minimize_raw_div_wrappers: true
      max_raw_div_wrappers: 1

    states:
      - ready
      - loading
      - empty_no_events
      - error_load_failed
      - success_populated

    interactions:
      - Click Dashboard breadcrumb link to close activities set nav to tenant user dashboard or provider dashboard per role.
      - Select any primary sidebar nav item to close activities overlay.

transitions:
  - from: shell_notifications_entry
    action: bell opens activities
    to: ra_activity_feed
  - from: ra_activity_feed
    action: click dashboard breadcrumb
    to: tud_dashboard_home
  - from: ra_activity_feed
    action: click dashboard breadcrumb as provider admin
    to: pad_dashboard_home
  - from: ra_activity_feed
    action: select sidebar nav
    to: shell_primary_workspace

validation_rules: []
