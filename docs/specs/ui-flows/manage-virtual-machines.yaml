flow: Manage virtual machines
statechart_ref: ../statecharts/manage-virtual-machines.statechart.yaml

implementation_status:
  as_of: '2026-06'
  deferred:
    - Console launch (launch_console permission, vcd_console_page transition)
    - Clone and migrate actions in VmActionsMenu
    - Full-page detail with dedicated console side card (shipped: drawer with Actions card only)

primary_api:
  list: GET /api/fulfillment/v1/compute_instances
  patch: PATCH /api/fulfillment/v1/compute_instances/{id}
  delete: DELETE /api/fulfillment/v1/compute_instances/{id}

rbac:
  required_permissions_by_step:
    mvm_list_view:
      view_vm_list: view_my_vms
      open_create_vm_modal: open_create_vm
      run_power_actions: operate_vm_power
      open_vm_detail: view_my_vms
    mvm_detail_drawer:
      view_vm_detail: view_my_vms
      perform_power_action: operate_vm_power
    mvm_topology_handoff:
      open_vm_from_topology: open_vm_from_topology

steps:
  - id: mvm_list_view
    title: My VMs list
    goal: >-
      View and filter VM instances, switch between grid cards and compact table, open create VM from
      the header, open detail, and trigger VM lifecycle actions (start, stop, restart, delete).

    ui:
      components:
        - PageSection
        - PageHeader
        - CreateVmWizard
        - Flex
        - FormSelect
        - Divider
        - SearchInput
        - ToggleGroup
        - Gallery
        - Card
        - VmStatusLabel
        - Table
        - Button
        - Label
    ui_policy:
      prefer_patternfly_primitives: true
      minimize_raw_div_wrappers: true
      max_raw_div_wrappers: 2

    states:
      - ready
      - loading
      - empty_no_vms
      - error_load_failed
      - success_populated
      - filtered_empty
      - power_filter_applied_from_dashboard
      - list_view_mode_cards
      - list_view_mode_table

    interactions:
      - Read header description: “View and filter instances. Use the layout toggle for grid cards (same style as templates) or a compact table.”
      - Click Create virtual machine in the header-right area to open the create VM wizard (tenant user only).
      - >-
        After wizard create, a **placeholder** card/row appears at the **end** of the list with **Creating** (+ spinner),
        wizard parameters, and no power actions. Visible only when status filter is **All**. Removed when
        `GET compute_instances` includes the VM (match by create response id, else name). After 30 minutes without
        list match, badge becomes **Still provisioning**. After the VM appears in the list, a **post-create watch**
        (`postCreateWatchStore`, survives navigation) keeps **Starting** at the **same list position** until API
        reports `starting` then `running` (never **Running** before **Starting**). Create POST does not immediately
        refetch/upsert the list (avoids stale **running**); list polls every **10s** while placeholder or post-create watch is active.
      - >-
        **VmStatusLabel** shows a spinner beside transitional badges (`starting`, `stopping`, `restarting`, `deleting`,
        `creating`, `still_provisioning`); stable states have no spinner.
      - Use the separator-bounded filter row to search by VM name, filter by status (all/running/stopped/paused), and filter by OS.
      - Toggle card versus table layout from the right side of the filter row with compact icon-only controls.
      - >-
        Table columns (Name, Status, OS, vCPU, Memory, IP) use the same normalized fields as cards; OS column uses
        derived os label/heuristic when `vm.os` demo field missing.
      - Review card layout with fixed minimum width and visible border; header places larger OS icon top-left and Console outline label + VmStatusLabel + actions menu top-right.
      - >-
        Card body order: VM **name** (`metadata.name`), optional description when present, CPU/Memory/Storage row using
        **spec.cores**, **spec.memory_gib** (GiB), **boot_disk.size_gib** (+ additional disks when present) after wire
        normalization — see backend-fulfillment.yaml `compute_instances_wire_format_and_ui.my_vms_surfaces`.
      - Divider, then inline keyed rows for **IP** (`status.ip_address`) and **created** (`metadata.creation_timestamp` normalized).
      - OS icon uses heuristic from **spec.image** / template when demo-only `os` field absent (same heuristic as detail Overview).
      - >-
        Open row or card actions menu with **start, stop, restart, delete** only. **Clone** and **migrate** are not
        offered until fulfillment APIs exist (code commented with RESTORE markers in VmActionsMenu).
        Enablement is state-aware (for example start only when stopped, stop/restart when running or paused).
      - >-
        Start and Stop call **PATCH /api/fulfillment/v1/compute_instances/{id}** (`run_strategy` + `status.state`).
        Power PATCH does **not** immediately refetch or upsert the list (avoids stale terminal state). Pending badges
        (`vmPowerPendingStore`, survives navigation) reconcile via list GET every **10s** while pending and on
        `refetchOnMount: always` when returning to My VMs; default list poll remains **30s**.
      - >-
        **Restart** — two pending phases: (1) **Restarting** from click until list returns **stopped** (ignore stale **running**);
        (2) **Starting** pending, **PATCH start**, until list returns **running** or **error**.
      - >-
        **Pending power display** — on Start / Stop / Restart click, badge shows **Starting** / **Stopping** / **Restarting**
        until list GET confirms the transition (ignore premature terminal states). Cleared on PATCH failure.
      - >-
        Delete: confirm in a modal; on confirm the list shows **Deleting** (+ spinner) immediately (`usePendingVmDeletes`).
        If the VM is running or paused, **PATCH stop** first, then **DELETE**. The card is removed when
        `GET compute_instances` no longer includes that id (not when the server first reports `deleting`).
        Modal closes on confirm; detail closes if open. List refetches on DELETE success but VM stays visible until absent from list GET.
      - Select VM row or card to replace the list with full-detail layout.
      - Re-select My VMs nav to return from detail to list.

  - id: mvm_detail_drawer
    title: Virtual machine detail drawer
    goal: Inspect VM properties in a drawer layout with Actions card; return to list from breadcrumb or close.

    ui:
      components:
        - PageSection
        - Breadcrumb
        - Stack
        - Flex
        - Card
        - Tabs
        - Title
        - Divider
        - DescriptionList
        - VmStatusLabel
        - Button
    ui_policy:
      prefer_patternfly_primitives: true
      minimize_raw_div_wrappers: true
      max_raw_div_wrappers: 2

    states:
      - ready
      - loading
      - error_vm_not_found
      - success_populated
      - power_action_pending
      - guest_os_running
      - guest_os_stopped
      - guest_os_paused

    interactions:
      - Read breadcrumb in upper-left: My VMs -> selected VM name.
      - Click My VMs breadcrumb item to return to the list view.
      - Review two-column drawer layout: primary card for tabbed VM properties and right-side Actions card (status, IP, power menu).
      - Navigate tabs within detail.
      - >-
        Actions card shows VmStatusLabel, IP address, and VmActionsMenu (start, stop, restart, delete;
        no clone, migrate, or console launch).
      - Delete from detail actions menu follows the same confirm + PATCH stop (when needed) + DELETE contract as the list view.
      - >-
        Overview tab: vCPU/Memory/Storage/Created align with wire-normalized spec + metadata (camelCase in TS after normalize).
      - >-
        Networking: IP from `status.ip_address`; subnet UUID may display short form or resolved name via networks/subnets APIs when available.
      - >-
        Conditions tab: render **type**, **status**, **reason**, **message**, **last_transition_time** from fulfillment
        condition objects (humanize proto enum suffixes optional); empty array shows existing empty-state copy.

  - id: mvm_topology_handoff
    title: Open VM detail from network topology
    goal: Tenant admin networks topology selects VM to jump tenant user My VMs list with detail open request.

    ui:
      components:
        - PageSection
        - Stack
        - NetworkTopologyPage
        - HandoffState
    ui_policy:
      prefer_patternfly_primitives: true
      minimize_raw_div_wrappers: true
      max_raw_div_wrappers: 1

    states:
      - request_pending
      - detail_open_consumed

    interactions:
      - Click VM node in topology when handler wired to openVirtualMachineDetailFromTopology.

transitions:
  - from: tud_dashboard_home
    action: click stat card navigating with optional power filter
    to: mvm_list_view
  - from: shell_primary_workspace
    action: select My VMs nav
    to: mvm_list_view
  - from: mvm_list_view
    action: click create virtual machine in page header (tenant user)
    to: cvm_modal_open
  - from: mvm_list_view
    action: select a virtual machine row or card
    to: mvm_detail_drawer
  - from: mvm_detail_drawer
    action: close detail or navigate back
    to: mvm_list_view
  # RESTORE when clone from actions is supported:
  # - from: mvm_list_view
  #   action: choose clone from actions
  #   to: cvm_wizard_source_clone
  - from: cvm_wizard_review_create
    action: provision success
    to: mvm_list_view
  - from: tad_networks_topology
    action: open vm detail from topology graph
    to: mvm_topology_handoff
  - from: mvm_topology_handoff
    action: shell switches to My VMs and consumes open request
    to: mvm_detail_drawer
  # RESTORE when console launch is wired:
  # - from: mvm_detail_drawer
  #   action: launch console while running opens new tab with demo query
  #   to: vcd_console_page

