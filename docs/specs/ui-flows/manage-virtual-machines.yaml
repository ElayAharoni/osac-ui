flow: Manage virtual machines
statechart_ref: ../statecharts/manage-virtual-machines.statechart.yaml

implementation_status:
  as_of: '2026-06'
  list_surface: table_only
  deferred:
    - Console launch (launch_console permission, vcd_console_page transition)
    - Clone and migrate actions in VmActionsMenu
    - Card/grid layout toggle
    - Paused status filter option

primary_api:
  list: GET /api/fulfillment/v1/compute_instances
  patch: PATCH /api/fulfillment/v1/compute_instances/{id}
  delete: DELETE /api/fulfillment/v1/compute_instances/{id}

rbac:
  required_permissions_by_step:
    mvm_list_view:
      view_vm_list: view_my_vms
      open_create_vm_modal: open_create_vm
      run_power_actions: operate_vm_power
      open_vm_detail: view_my_vms
    mvm_detail_drawer:
      view_vm_detail: view_my_vms
      perform_power_action: operate_vm_power
    mvm_topology_handoff:
      open_vm_from_topology: open_vm_from_topology

steps:
  - id: mvm_list_view
    title: Virtual machines list
    goal: >-
      View and filter VM instances in a compact table, open create VM from the header, open detail via
      VM name link, and trigger VM lifecycle actions (start, stop, restart, delete).

    ui:
      components:
        - PageSection
        - PageHeader
        - CatalogProvisionWizard
        - Flex
        - ToggleGroup
        - Divider
        - SearchInput
        - VmStatusLabel
        - Table
        - Button
    ui_policy:
      prefer_patternfly_primitives: true
      minimize_raw_div_wrappers: true
      max_raw_div_wrappers: 2

    states:
      - ready
      - loading
      - empty_no_vms
      - error_load_failed
      - success_populated
      - filtered_empty
      - power_filter_applied_from_query

    interactions:
      - Read header description: “View and filter your virtual machines.”
      - Click Create virtual machine in the header-right area to open the catalog provision wizard (tenant user only).
      - >-
        After wizard create, a **placeholder** row appears at the **end** of the list with **Creating** (+ spinner),
        wizard parameters, and no power actions. Visible only when status filter is **All**. Removed when
        `GET compute_instances` includes the VM (match by create response id, else name). After 30 minutes without
        list match, badge becomes **Still provisioning**. After the VM appears in the list, a **post-create watch**
        (`postCreateWatchStore`, survives navigation) keeps **Starting** at the **same list position** until API
        reports `starting` then `running` (never **Running** before **Starting**). Create POST triggers immediate
        refetch plus list polls every **10s** while placeholder or post-create watch is active.
      - >-
        **VmStatusLabel** shows a spinner beside transitional badges (`starting`, `stopping`, `restarting`, `deleting`,
        `creating`, `still_provisioning`); stable states have no spinner.
      - Search by VM name and filter by status using a **ToggleGroup** (All, Running, Stopped). Optional `?power=` query on load.
      - >-
        Table columns: Name (link-style button opens detail), Status, vCPU, Memory, IP. Rows are not fully clickable.
      - Open row actions menu with **start, stop, restart, delete** only. **Clone** and **migrate** are not
        offered until fulfillment APIs exist (code commented with RESTORE markers in VmActionsMenu).
        Enablement is state-aware (for example start only when stopped, stop/restart when running or paused).
      - >-
        Start and Stop call **PATCH /api/fulfillment/v1/compute_instances/{id}** (`run_strategy` + `status.state`).
        Power PATCH does **not** immediately refetch or upsert the list (avoids stale terminal state). Pending badges
        (`vmPowerPendingStore`, survives navigation) reconcile via list GET every **10s** while pending and on
        `refetchOnMount: always` when returning to Virtual machines; default list poll remains **30s**.
      - >-
        **Restart** — two pending phases: (1) **Restarting** from click until list returns **stopped** (ignore stale **running**);
        (2) **Starting** pending, **PATCH start**, until list returns **running** or **error**.
      - >-
        Delete: confirm in a modal; on confirm the list shows **Deleting** (+ spinner) immediately (`usePendingVmDeletes`).
        If the VM is running or paused, **PATCH stop** first, then **DELETE**. The row is removed when
        `GET compute_instances` no longer includes that id (not when the server first reports `deleting`).
        Modal closes on confirm; detail closes if open.
      - Click VM **name** link to replace the list with detail layout.
      - Re-select Virtual machines nav to return from detail to list.

  - id: mvm_detail_drawer
    title: Virtual machine detail drawer
    goal: Inspect VM properties in a drawer layout with Actions card; return to list from breadcrumb or close.

    ui:
      components:
        - PageSection
        - Breadcrumb
        - Stack
        - Flex
        - Card
        - Tabs
        - Title
        - Divider
        - DescriptionList
        - VmStatusLabel
        - Button
    ui_policy:
      prefer_patternfly_primitives: true
      minimize_raw_div_wrappers: true
      max_raw_div_wrappers: 2

    states:
      - ready
      - loading
      - error_vm_not_found
      - success_populated
      - power_action_pending
      - guest_os_running
      - guest_os_stopped
      - guest_os_paused

    interactions:
      - Read breadcrumb in upper-left: Virtual machines -> selected VM name.
      - Click Virtual machines breadcrumb item to return to the list view.
      - Review two-column drawer layout: primary card for tabbed VM properties and right-side Actions card (status, IP, power menu).
      - Navigate tabs within detail.
      - >-
        Actions card shows VmStatusLabel, IP address, and VmActionsMenu (start, stop, restart, delete;
        no clone, migrate, or console launch).
      - Delete from detail actions menu follows the same confirm + PATCH stop (when needed) + DELETE contract as the list view.
      - >-
        Overview tab: vCPU/Memory/Storage/Created align with wire-normalized spec + metadata (camelCase in TS after normalize).
      - >-
        Networking: IP from `status.ip_address`; subnet UUID may display short form or resolved name via networks/subnets APIs when available.
      - >-
        Conditions tab: render **type**, **status**, **reason**, **message**, **last_transition_time** from fulfillment
        condition objects (humanize proto enum suffixes optional); empty array shows existing empty-state copy.

  - id: mvm_topology_handoff
    title: Open VM detail from network topology
    goal: Tenant admin networks topology selects VM to jump tenant user Virtual machines list with detail open request.

    ui:
      components:
        - PageSection
        - Stack
        - NetworkTopologyPage
        - HandoffState
    ui_policy:
      prefer_patternfly_primitives: true
      minimize_raw_div_wrappers: true
      max_raw_div_wrappers: 1

    states:
      - request_pending
      - detail_open_consumed

    interactions:
      - Click VM node in topology when handler wired to openVirtualMachineDetailFromTopology.

transitions:
  - from: shell_primary_workspace
    action: select Virtual machines nav
    to: mvm_list_view
  - from: mvm_list_view
    action: click create virtual machine in page header (tenant user)
    to: cvm_modal_open
  - from: mvm_list_view
    action: click virtual machine name in table
    to: mvm_detail_drawer
  - from: mvm_detail_drawer
    action: close detail or navigate back
    to: mvm_list_view
  - from: cvm_wizard_review_create
    action: provision success
    to: mvm_list_view
  - from: tad_networks_topology
    action: open vm detail from topology graph
    to: mvm_topology_handoff
  - from: mvm_topology_handoff
    action: shell switches to Virtual machines and consumes open request
    to: mvm_detail_drawer

validation_rules: []
