id: tenant-user-dashboard
title: Tenant User Dashboard Statechart
source_flow: ../ui-flows/tenant-user-dashboard.yaml
rbac_ref: ../rbac.yaml

implementation_status:
  as_of: '2026-06'
  shipped: KPI cards + create VM only
  deferred: utilization charts, quota, recent activities

context:
  role: tenantUser
  tenantId: null

initial: tud_dashboard_home

states:
  tud_dashboard_home:
    permissions:
      - view_dashboard
      - open_create_vm
      - view_my_vms
    on:
      CLICK_CREATE_VM:
        target: cvm_wizard_template
        guard: can(role, "open_create_vm")
      CLICK_STAT_CARD:
        target: mvm_list_view
        guard: can(role, "view_my_vms")
      NAV_SPARSE:
        target: tud_sparse_placeholder_page

  tud_sparse_placeholder_page:
    permissions: [navigate_shell_sections]
    on:
      NAV_DASHBOARD:
        target: tud_dashboard_home

  mvm_list_view:
    external: manage-virtual-machines.statechart.yaml#mvm_list_view

  cvm_wizard_template:
    external: create-virtual-machine-wizard.statechart.yaml#cvm_wizard_template

ai-hints:
  summary: >-
    Shipped dashboard shows four power-state KPI cards from compute_instances list and opens
    template-only create wizard. Transitions to ra_activity_feed and utilization states are deferred.
