id: provider-administration
title: Provider Administration Statechart
source_flow: ../ui-flows/provider-administration.yaml
rbac_ref: ../rbac.yaml

context:
  role: providerAdmin
  tenantId: vertexa

initial: pad_dashboard_home

states:
  pad_dashboard_home:
    permissions:
      - view_provider_dashboard
      - manage_tenants
      - manage_resource_allocation
      - manage_global_templates
      - view_infrastructure
      - view_topology
    on:
      OPEN_TENANT_ORGANIZATIONS:
        target: pad_tenant_organizations
        guard: can(role, "manage_tenants")
      OPEN_RESOURCE_ALLOCATION:
        target: pad_resource_allocation_placeholder
        guard: can(role, "manage_resource_allocation")
      OPEN_GLOBAL_TEMPLATES:
        target: pad_global_templates
        guard: can(role, "manage_global_templates")
      OPEN_INFRASTRUCTURE:
        target: pad_infrastructure_topology
        guard: can(role, "view_infrastructure")

  pad_tenant_organizations:
    permissions: [manage_tenants]
  pad_resource_allocation_placeholder:
    permissions: [manage_resource_allocation]
  pad_global_templates:
    permissions:
      - manage_global_templates
      - create_from_template
  pad_infrastructure_topology:
    permissions:
      - view_infrastructure
      - view_topology
  pad_security_placeholder:
    permissions: [view_infrastructure]
  pad_platform_settings_placeholder:
    permissions: [view_infrastructure]

ai-hints:
  summary: >-
    Provider admin machine for tenant organization operations and global infrastructure views.
  impossibleStates:
    - role=tenantAdmin and state=pad_dashboard_home
