id: create-virtual-machine-wizard
title: Create Virtual Machine Wizard Statechart
source_flow: ../ui-flows/create-virtual-machine-wizard.yaml
rbac_ref: ../rbac.yaml

context:
  role: null
  tenantId: null
  wizardSessionId: null
  deploymentMethod: null
  selectedTemplateId: null
  cloneSourceVmId: null
  cloneNewName: ''
  isSubmitting: false
  bffAdvancePending: false
  bffLastError: null

initial: cvm_modal_closed

states:
  cvm_modal_closed:
    permissions:
      - open_create_vm
      - clone_vm
      - create_from_template
    on:
      OPEN_CREATE_VM:
        target: cvm_modal_open
        guard: can(role, "open_create_vm")
      OPEN_FROM_TEMPLATE:
        target: cvm_wizard_template
        guard: can(role, "create_from_template")
      OPEN_FROM_CLONE:
        target: cvm_wizard_source_clone
        guard: can(role, "clone_vm")

  cvm_modal_open:
    permissions:
      - use_vm_wizard
    on:
      START_DEPLOYMENT_DETAILS:
        target: cvm_wizard_deployment_details
      START_TEMPLATE_FLOW:
        target: cvm_wizard_template
      START_CLONE_FLOW:
        target: cvm_wizard_source_clone

  cvm_wizard_deployment_details:
    permissions: [use_vm_wizard]
    on:
      NEXT_NEW: { target: cvm_wizard_guest_os }
      NEXT_TEMPLATE: { target: cvm_wizard_template }
      NEXT_CLONE: { target: cvm_wizard_source_clone }
      CLOSE: { target: cvm_modal_closed }
  cvm_wizard_guest_os:
    permissions: [use_vm_wizard]
    on:
      NEXT: { target: cvm_wizard_boot_source }
  cvm_wizard_boot_source:
    permissions: [use_vm_wizard]
    on:
      NEXT: { target: cvm_wizard_compute }
  cvm_wizard_compute:
    permissions: [use_vm_wizard]
    on:
      NEXT: { target: cvm_wizard_customization }
  cvm_wizard_template:
    permissions:
      - use_vm_wizard
      - create_from_template
    on:
      NEXT: { target: cvm_wizard_customization }
  cvm_wizard_source_clone:
    permissions:
      - use_vm_wizard
      - clone_vm
    on:
      NEXT: { target: cvm_wizard_review_create }
  cvm_wizard_customization:
    permissions: [use_vm_wizard]
    on:
      NEXT: { target: cvm_wizard_review_create }
  cvm_wizard_review_create:
    permissions:
      - use_vm_wizard
      - provision_vm
    on:
      CREATE_SUCCESS:
        target: mvm_list_view
        guard: can(role, "provision_vm")
      CLOSE:
        target: cvm_modal_closed

  mvm_list_view:
    external: manage-virtual-machines.statechart.yaml#mvm_list_view

ai-hints:
  summary: >-
    Multi-path create VM machine (new, template, clone) ending in provision with RBAC guards.
    Modal hosts a PatternFly Wizard with WizardNav; UX flow ids (cvm_wizard_*) map to BFF activeStepId
    strings deployment, guest-os, boot-source, compute, template, clone-source, customization, review.
    Deployment and guest-os steps use selectable PatternFly Cards (radiogroup), not plain stacked Radios;
    guest-os version is a FormSelect under the cards (see ui-flow step_worksheets). Boot-source uses
    Title + intro Content then two Radios with descriptions (see ui-flow boot-source worksheet). Compute
    uses Title + intro Content then Form with vCPU and Memory (GiB) TextInputs (see ui-flow compute worksheet).
    Customization new path adds optional cloud-init TextArea only; template path keeps VM name, Tabs
    with Overview summary and Switches (see ui-flow customization worksheet). Review step shows Title + confirm intro, then
    start-after Checkbox directly under the intro and flow-specific review content: compact DescriptionList for new path, expanded sections for template/clone (see ui-flow review worksheet).
    Template step uses OS + workload FormSelects, clear filters, search,
    and selectable template cards with workload profile labels (see ui-flow template worksheet).
    Clone-source step mirrors template-style card selection: New VM name input under intro, OS/state/search filters,
    and cards with OS icon + state label and compact CPU/memory/storage + created/owner details (see ui-flow clone-source worksheet).
    Catalog or clone-drawer entry sets BFF skipDeployment so the first ordered step may be template
    or clone-source instead of deployment. Transitions labeled NEXT imply a successful BFF advance for
    that step; guard UI with bffAdvancePending and surface bffLastError without leaving the step on
    validation failure. wizardSessionId is assigned when the modal opens (session POST); cleared on
    DELETE or successful finalize. Ephemeral routing: no URL owns machine state.
  bff_events:
    description: >-
      Implementations may model BFF I/O as internal services; optional explicit events include
      WIZARD_SESSION_CREATED, BFF_ADVANCE_OK, BFF_ADVANCE_REJECTED, BFF_FINALIZE_OK, BFF_FINALIZE_REJECTED,
      WIZARD_SESSION_ABANDONED (modal close).
  impossibleStates:
    - deploymentMethod=clone and state=cvm_wizard_guest_os
    - deploymentMethod=template and state=cvm_wizard_guest_os
