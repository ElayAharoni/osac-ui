id: recent-activities
title: Recent Activities Statechart
source_flow: ../ui-flows/recent-activities.yaml
rbac_ref: ../rbac.yaml

context:
  role: null
  tenantId: null

initial: ra_activity_feed

states:
  ra_activity_feed:
    permissions:
      - view_recent_activities
      - navigate_shell_sections
    on:
      DASHBOARD_BREADCRUMB_TENANT:
        target: tud_dashboard_home
        guard: can(role, "view_recent_activities")
      DASHBOARD_BREADCRUMB_PROVIDER:
        target: pad_dashboard_home
        guard: can(role, "view_recent_activities")
      SELECT_SIDEBAR_NAV:
        target: shell_primary_workspace
        guard: can(role, "navigate_shell_sections")

  tud_dashboard_home:
    external: tenant-user-dashboard.statechart.yaml#tud_dashboard_home
  pad_dashboard_home:
    external: provider-administration.statechart.yaml#pad_dashboard_home
  shell_primary_workspace:
    external: application-shell-session.statechart.yaml#shell_primary_workspace

ai-hints:
  summary: >-
    Activity feed machine opened from shell notifications and closed through breadcrumb or nav selection.
