id: application-shell-session
title: Application Shell Session Statechart
source_flow: ../ui-flows/application-shell-session.yaml
rbac_ref: ../rbac.yaml
design_system_ref: ../design-system.yaml

context:
  role: null
  tenantId: null
  activeNav: virtual_machines
  isUserMenuOpen: false
  theme: light

initial: shell_primary_workspace

states:
  shell_primary_workspace:
    permissions:
      - view_shell
      - navigate_shell_sections
      - logout
      - use_theme_toggle
      - view_recent_activities
    on:
      SELECT_PRIMARY_NAV_ITEM:
        target: shell_primary_workspace
        guard: can(role, "navigate_shell_sections")
      CLICK_MASTHEAD_BELL:
        target: shell_notifications_entry
        guard: can(role, "view_recent_activities")
      CLICK_HELP_OR_SETTINGS:
        target: shell_utility_stubs
        guard: can(role, "navigate_shell_sections")
      ACCOUNT_MENU_LOGOUT:
        target: wrs_welcome_landing
        guard: can(role, "logout")
      THEME_CONTROL_LANDING_SHORTCUT:
        target: wrs_welcome_landing
        guard: can(role, "logout")

  shell_notifications_entry:
    permissions:
      - view_recent_activities
    on:
      RENDER_RECENT_ACTIVITIES:
        target: ra_activity_feed
      SELECT_NAV_BEFORE_ACTIVITIES_RENDER:
        target: shell_primary_workspace

  shell_utility_stubs:
    permissions:
      - navigate_shell_sections

  wrs_welcome_landing:
    external: welcome-and-role-selection.statechart.yaml#wrs_welcome_landing
  ra_activity_feed:
    external: recent-activities.statechart.yaml#ra_activity_feed

ai-hints:
  summary: >-
    Core authenticated shell machine. Nav, masthead actions, and logout controls are role-scoped
    through RBAC permissions.
  design_system_constraints:
    - Use PatternFly 6 primitives for shell structure and avoid raw div layout wrappers.
    - Avoid custom CSS for layout/spacing/structure except documented design-system exceptions.
    - Keep token-driven light/dark theming semantics (pf-v6-theme-dark toggle; light default baseline).
  impossibleStates:
    - shell_notifications_entry without view_recent_activities permission
