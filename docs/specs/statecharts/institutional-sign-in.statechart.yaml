id: institutional-sign-in
title: Institutional Sign-In Statechart
source_flow: ../ui-flows/institutional-sign-in.yaml
rbac_ref: ../rbac.yaml

context:
  role: null
  tenantId: null
  username: ''
  password: ''
  trustedIssuersLoaded: false
  isLoading: false

initial: auth_sign_in_form

states:
  auth_sign_in_form:
    permissions:
      - submit_sign_in
      - switch_institution
    on:
      SUBMIT_LOGIN:
        target: auth_post_login_transition
        guard: can(role, "submit_sign_in")
      CHOOSE_ANOTHER_INSTITUTION:
        target: wrs_welcome_landing
        guard: can(role, "switch_institution")
      TRUSTED_ISSUERS_LOADED:
        target: auth_sign_in_form
        guard: can(role, "submit_sign_in")

  auth_post_login_transition:
    permissions:
      - submit_sign_in
    on:
      LOGIN_SUCCESS_TENANT_USER:
        target: tud_dashboard_home
      LOGIN_SUCCESS_TENANT_ADMIN:
        target: tad_dashboard_home
      LOGIN_SUCCESS_PROVIDER_ADMIN:
        target: pad_dashboard_home

  wrs_welcome_landing:
    external: welcome-and-role-selection.statechart.yaml#wrs_welcome_landing
  tud_dashboard_home:
    external: tenant-user-dashboard.statechart.yaml#tud_dashboard_home
  tad_dashboard_home:
    external: tenant-administration.statechart.yaml#tad_dashboard_home
  pad_dashboard_home:
    external: provider-administration.statechart.yaml#pad_dashboard_home

ai-hints:
  summary: >-
    Sign-in machine for all branded identity pages. Successful auth transition lands in a role-specific
    dashboard state.
  impossibleStates:
    - role=providerAdmin and target=tud_dashboard_home
    - role=tenantUser and target=pad_dashboard_home
