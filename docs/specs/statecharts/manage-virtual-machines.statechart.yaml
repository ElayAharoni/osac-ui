id: manage-virtual-machines
title: Manage Virtual Machines Statechart
source_flow: ../ui-flows/manage-virtual-machines.yaml
rbac_ref: ../rbac.yaml

context:
  role: null
  tenantId: null
  selectedVmId: null
  listMode: table
  powerFilter: all

initial: mvm_list_view

states:
  mvm_list_view:
    permissions:
      - view_my_vms
      - open_create_vm
      - operate_vm_power
    on:
      SELECT_VM:
        target: mvm_detail_drawer
        guard: can(role, "view_my_vms")
      CLICK_CREATE_VIRTUAL_MACHINE:
        target: cvm_modal_open
        guard: can(role, "open_create_vm")
      # RESTORE when clone from actions is supported:
      # CLONE_FROM_ACTIONS:
      #   target: cvm_wizard_source_clone
      #   guard: can(role, "clone_vm")
      CONFIRM_DELETE_VM:
        target: mvm_list_view
        guard: can(role, "operate_vm_power")
        note: >-
          After DELETE /api/fulfillment/v1/compute_instances/{id} succeeds; return to list and clear selectedVmId.

  mvm_detail_drawer:
    permissions:
      - view_my_vms
      - operate_vm_power
      - launch_console
    on:
      CLOSE_DETAIL:
        target: mvm_list_view
      CONFIRM_DELETE_VM:
        target: mvm_list_view
        guard: can(role, "operate_vm_power")
      LAUNCH_CONSOLE:
        target: vcd_console_page
        guard: can(role, "launch_console")

  mvm_topology_handoff:
    permissions:
      - open_vm_from_topology
    on:
      OPEN_REQUEST_CONSUMED:
        target: mvm_detail_drawer
        guard: can(role, "open_vm_from_topology")

  cvm_modal_open:
    external: create-virtual-machine-wizard.statechart.yaml#cvm_modal_open
  # RESTORE when clone from My VMs is supported:
  # cvm_wizard_source_clone:
  #   external: create-virtual-machine-wizard.statechart.yaml#cvm_wizard_source_clone
  vcd_console_page:
    external: vm-console-standalone-demo.statechart.yaml#vcd_console_page

ai-hints:
  summary: >-
    VM fleet table/detail machine: search + status ToggleGroup, name link opens detail drawer,
    lifecycle actions (start/stop/restart/delete), create VM from header, topology handoff.
    Pending create/power badges poll list every 10s. Clone/migrate/console deferred.
  impossibleStates:
    - mvm_detail_drawer with selectedVmId=null
