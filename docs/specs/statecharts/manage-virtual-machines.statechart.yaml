id: manage-virtual-machines
title: Manage Virtual Machines Statechart
source_flow: ../ui-flows/manage-virtual-machines.yaml
rbac_ref: ../rbac.yaml

context:
  role: null
  tenantId: null
  selectedVmId: null
  listMode: cards
  powerFilter: all
  osFilter: all

initial: mvm_list_view

states:
  mvm_list_view:
    permissions:
      - view_my_vms
      - open_create_vm
      - operate_vm_power
    on:
      SELECT_VM:
        target: mvm_detail_drawer
        guard: can(role, "view_my_vms")
      CLICK_CREATE_VIRTUAL_MACHINE:
        target: cvm_modal_open
        guard: can(role, "open_create_vm")
      # RESTORE when clone from actions is supported:
      # CLONE_FROM_ACTIONS:
      #   target: cvm_wizard_source_clone
      #   guard: can(role, "clone_vm")
      CONFIRM_DELETE_VM:
        target: mvm_list_view
        guard: can(role, "operate_vm_power")
        note: >-
          After DELETE /api/fulfillment/v1/compute_instances/{id} succeeds; return to list and clear selectedVmId.

  mvm_detail_drawer:
    permissions:
      - view_my_vms
      - operate_vm_power
      - launch_console
    on:
      CLOSE_DETAIL:
        target: mvm_list_view
      CONFIRM_DELETE_VM:
        target: mvm_list_view
        guard: can(role, "operate_vm_power")
      LAUNCH_CONSOLE:
        target: vcd_console_page
        guard: can(role, "launch_console")

  mvm_topology_handoff:
    permissions:
      - open_vm_from_topology
    on:
      OPEN_REQUEST_CONSUMED:
        target: mvm_detail_drawer
        guard: can(role, "open_vm_from_topology")

  cvm_modal_open:
    external: create-virtual-machine-wizard.statechart.yaml#cvm_modal_open
  # RESTORE when clone from My VMs is supported:
  # cvm_wizard_source_clone:
  #   external: create-virtual-machine-wizard.statechart.yaml#cvm_wizard_source_clone
  vcd_console_page:
    external: vm-console-standalone-demo.statechart.yaml#vcd_console_page

ai-hints:
  summary: >-
    VM fleet list/detail machine with lifecycle actions (start/stop/restart/delete), create VM from list header,
    topology handoff, and console launch. Clone and migrate menu actions are disabled until fulfillment supports them. List view header includes helper description, right-aligned
    create button, separator, then filter row (name search + status dropdown all/running/stopped/paused
    + OS dropdown on left, compact icon-only cards/table toggle on right). Card mode uses bordered cards
    with larger OS icon top-left, Console outline label + VmStatusLabel + actions menu top-right,
    VM name below header row, description, CPU/Memory/Storage key-above-value row, divider, then
    IP address and Created inline rows. Selecting a row/card swaps list layout to full-detail page
    layout with upper-left breadcrumb (My VMs -> VM name), large primary tabbed properties card,
    smaller right-side console card (status, launch button, actions menu). Actions menus expose
    start stop restart delete with state-aware disabled options (clone and migrate not shown). VmStatusLabel spinner on
    transitional states. Pending badges (session stores) until list GET confirms transitions; power/create poll list
    every 10s while pending; restart PATCH stop then start; create placeholder at list end then post-create Starting.
  impossibleStates:
    - mvm_detail_drawer with selectedVmId=null
