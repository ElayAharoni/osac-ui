id: vm-console-standalone-demo
title: VM Console Standalone Demo Statechart
source_flow: ../ui-flows/vm-console-standalone-demo.yaml
rbac_ref: ../rbac.yaml

context:
  role: null
  tenantId: null
  guestOs: linux
  demoQuery: vm-console

initial: vcd_console_page

states:
  vcd_console_page:
    permissions:
      - launch_console
    on:
      CLOSE_WHEN_LOGGED_OUT:
        target: wrs_welcome_landing
      CLOSE_WHEN_LOGGED_IN:
        target: shell_primary_workspace

  wrs_welcome_landing:
    external: welcome-and-role-selection.statechart.yaml#wrs_welcome_landing
  shell_primary_workspace:
    external: application-shell-session.statechart.yaml#shell_primary_workspace

ai-hints:
  summary: >-
    Standalone console demo route entered from VM detail. Close behavior branches by session state.
  impossibleStates:
    - demoQuery!=vm-console and state=vcd_console_page
