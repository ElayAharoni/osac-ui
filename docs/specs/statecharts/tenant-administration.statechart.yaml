id: tenant-administration
title: Tenant Administration Statechart
source_flow: ../ui-flows/tenant-administration.yaml
rbac_ref: ../rbac.yaml

context:
  role: tenantAdmin
  tenantId: null

initial: tad_dashboard_home

states:
  tad_dashboard_home:
    permissions:
      - view_tenant_admin_dashboard
      - manage_users
      - view_quota
      - view_topology
      - view_catalog
    on:
      NAVIGATE_USERS_TILE:
        target: tad_users
        guard: can(role, "manage_users")
      NAVIGATE_QUOTA_TILE:
        target: tad_quota
        guard: can(role, "view_quota")
      NAVIGATE_TEMPLATES_TILE:
        target: vmc_catalog_grid
        guard: can(role, "view_catalog")
      NAVIGATE_NETWORKS_TILE:
        target: tad_networks_topology
        guard: can(role, "view_topology")
      NAVIGATE_STORAGE_TILE:
        target: tad_storage_placeholder

  tad_users:
    permissions: [manage_users]
  tad_quota:
    permissions: [view_quota]
  tad_networks_topology:
    permissions:
      - view_topology
      - open_vm_from_topology
    on:
      CLICK_VM_NODE:
        target: mvm_topology_handoff
        guard: can(role, "open_vm_from_topology")
  tad_storage_placeholder:
    permissions: [view_tenant_admin_dashboard]
  tad_org_settings_placeholder:
    permissions: [view_tenant_admin_dashboard]
  tad_org_security_placeholder:
    permissions: [view_tenant_admin_dashboard]

  vmc_catalog_grid:
    external: vm-template-catalog.statechart.yaml#vmc_catalog_grid
  mvm_topology_handoff:
    external: manage-virtual-machines.statechart.yaml#mvm_topology_handoff

ai-hints:
  summary: >-
    Tenant admin workspace machine with user/quota/topology and template catalog handoffs.
