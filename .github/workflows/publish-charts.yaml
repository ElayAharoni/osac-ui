name: Publish charts

on:
  workflow_run:
    workflows: ["Publish container image"]
    types: [completed]

jobs:

  guard:
    name: Verify image build succeeded
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.event == 'push' &&
      startsWith(github.event.workflow_run.head_branch, 'v')
    outputs:
      tag: ${{ github.event.workflow_run.head_branch }}
      sha: ${{ github.event.workflow_run.head_sha }}
    steps:
    - name: Check image build result
      run: |
        if [[ "${{ github.event.workflow_run.conclusion }}" != "success" ]]; then
          echo "::error::Image build for tag ${{ github.event.workflow_run.head_branch }} did not succeed (conclusion: ${{ github.event.workflow_run.conclusion }}). Refusing to publish chart."
          exit 1
        fi
        echo "Image build succeeded for tag ${{ github.event.workflow_run.head_branch }}"

  publish-ui-chart:
    name: Publish UI chart
    needs: guard
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ needs.guard.outputs.sha }}
        fetch-depth: 0
        persist-credentials: false
    - id: run
      env:
        TAG: ${{ needs.guard.outputs.tag }}
      run: |
        # Login to the registry:
        export registry="ghcr.io"
        echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login --username "${{ github.actor }}" --password-stdin "${registry}"

        # Get the git version from the tag that triggered the image build:
        export git_version="${TAG}"

        # Update the image reference in the chart:
        export app_version="${git_version}"
        export app_image="${registry}/${{ github.repository }}:${app_version}"
        yq -i '.images.ui = strenv(app_image)' charts/ui/values.yaml

        # Package the chart:
        export chart_version="${git_version#v}"
        helm package charts/ui --version "${chart_version}" --app-version "${app_version}"

        # Push the chart to the registry:
        export chart_name="$(yq -r '.name' charts/ui/Chart.yaml)"
        export chart_file="${chart_name}-${chart_version}.tgz"
        helm push "${chart_file}" "oci://${registry}/${{ github.repository_owner }}/charts"

    - name: Create GitHub Release
      run: |
        gh release create "${TAG}" \
          --repo "${{ github.repository }}" \
          --title "osac-ui ${TAG}" \
          --generate-notes \
        || gh release edit "${TAG}" \
          --repo "${{ github.repository }}" \
          --title "osac-ui ${TAG}"
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        TAG: ${{ needs.guard.outputs.tag }}
