apiVersion: apps/v1
kind: Deployment
metadata:
  name: osac
  namespace: osac-dev
  labels:
    app: osac
spec:
  replicas: 1
  selector:
    matchLabels:
      app: osac
  template:
    metadata:
      labels:
        app: osac
    spec:
      containers:
        - name: osac
          image: osac:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: osac-config
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
