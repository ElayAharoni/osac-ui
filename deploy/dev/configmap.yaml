apiVersion: v1
kind: ConfigMap
metadata:
  name: osac-config
  namespace: osac-dev
data:
  PORT: '8080'
  HOST: '0.0.0.0'
  LOG_LEVEL: 'info'
  OSAC_API_MODE: 'mock'
  # Uncomment and set to enable fulfillment proxy mode:
  # OSAC_API_MODE: "dev"
  # FULFILLMENT_API_URL: "https://fulfillment.example.com/api"
  # OIDC_CLIENT_ID: "osac-demo"
  # KEYCLOAK_REALM: "osac"
  # KEYCLOAK_URL: "https://auth.example.com"
